spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8081}
server.address=0.0.0.0

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/DHV}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.CharSet=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO
logging.level.com.project.web_clone=${APP_LOG_LEVEL:DEBUG}

spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (absolute path or relative to working dir)
app.upload-dir=${UPLOAD_DIR:./uploads}
